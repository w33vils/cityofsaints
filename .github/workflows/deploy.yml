name: Deploy to Azure App Service

on:
  push:
    branches: [main]

jobs:
  deploy-cms:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install CMS dependencies
        working-directory: cms
        run: npm ci
      - name: Build CMS
        working-directory: cms
        run: npm run build
        env:
          NODE_ENV: production
          DATABASE_CLIENT: postgres
          DATABASE_HOST: localhost
          DATABASE_PORT: 5432
          DATABASE_NAME: placeholder
          DATABASE_USERNAME: placeholder
          DATABASE_PASSWORD: placeholder
          APP_KEYS: build-key-1,build-key-2,build-key-3,build-key-4
          API_TOKEN_SALT: build-salt
          ADMIN_JWT_SECRET: build-admin-jwt
          TRANSFER_TOKEN_SALT: build-transfer-salt
          JWT_SECRET: build-jwt
      - name: Remove dev dependencies
        working-directory: cms
        run: npm prune --omit=dev
      - name: Ensure uploads directory exists
        run: mkdir -p cms/public/uploads
      - name: Create .skipBuild marker
        run: touch cms/.skipBuild
      - uses: azure/webapps-deploy@v3
        with:
          app-name: cityofsaints-cms
          publish-profile: ${{ secrets.AZURE_CMS_PUBLISH_PROFILE }}
          package: ./cms

  deploy-frontend:
    needs: deploy-cms
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci
      - name: Build frontend
        working-directory: frontend
        run: npm run build
        env:
          NEXT_PUBLIC_STRAPI_URL: ${{ secrets.STRAPI_URL }}
          NEXT_PUBLIC_SITE_URL: ${{ secrets.SITE_URL }}
      - name: Assemble standalone package
        run: |
          cp -r frontend/public frontend/.next/standalone/public
          cp -r frontend/.next/static frontend/.next/standalone/.next/static
      - uses: azure/webapps-deploy@v3
        with:
          app-name: cityofsaints-frontend
          publish-profile: ${{ secrets.AZURE_FRONTEND_PUBLISH_PROFILE }}
          package: ./frontend/.next/standalone
